name: Farebox
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Farebox:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Farebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridecost
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        DEVELOPMENT_TEAM: W7Q885Q59C
    info:
      path: Farebox/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
  FareboxTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FareboxTests
    dependencies:
      - target: Farebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridecost.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  FareboxUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FareboxUITests
    dependencies:
      - target: Farebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridecost.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Farebox:
    build:
      targets:
        Farebox: all
    test:
      targets:
        - FareboxTests
        - FareboxUITests
    run:
      config: Debug
